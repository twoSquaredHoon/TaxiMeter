<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Taxi Meter — Phone App Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="device-frame">
    <main class="app" id="app" aria-label="택시 미터기 앱">
      <header class="status-banner" id="status-banner">
        <span class="status-text" id="status-text">주행중</span>
      </header>

      <section class="meter" aria-label="미터기 표시">
        <div class="meter-top">
          <div class="meter-meta">
            <span class="meter-trip" id="trip-number">34</span>
            <span class="meter-speed" id="speed">0.0 Km/h</span>
          </div>
          <div class="meter-horse-block">
            <div class="meter-horse" aria-hidden="true">
              <svg viewBox="0 0 110 70" xmlns="http://www.w3.org/2000/svg">
                <path fill="currentColor" d="M12 48c4-10 14-18 26-20l4-14 8 4-2 12c8 0 16 4 20 12l12-4 4 8-8 4c4 8 0 16-8 20H28c-8 0-16-4-20-12l-4 4zm4 4h52l-4 8H20l-4-8z"/>
              </svg>
            </div>
            <span class="meter-percent" id="horse-percent">0%</span>
          </div>
        </div>

        <div class="meter-fare-block">
          <span class="meter-fare" id="fare">3000</span>
          <span class="meter-unit">원</span>
        </div>

        <div class="meter-bottom">
          <span class="meter-countdown" id="countdown">2000</span>
          <span class="meter-secondary" id="secondary-value">0</span>
        </div>
      </section>

      <nav class="button-grid" aria-label="미터기 조작">
        <button type="button" class="ctrl-btn btn-empty" id="btn-empty">빈차</button>
        <button type="button" class="ctrl-btn btn-driving" id="btn-driving">
          <span>주행</span>
          <span>(시외)</span>
        </button>
        <button type="button" class="ctrl-btn btn-surcharge" id="btn-surcharge">할증</button>
        <button type="button" class="ctrl-btn btn-payment" id="btn-payment">지불</button>
      </nav>
    </main>
  </div>

  <p class="prototype-hint">프로토타입 · 주행 중 카운트다운이 감소하고 0에서 요금이 증가합니다</p>

  <script src="app.js"></script>
</body>
</html>
